global:
  scrape_interval: 15s
  evaluation_interval: 15s
alerting:
  alertmanagers:
  - static_configs:
    - targets: []
rule_files: null
scrape_configs:
- job_name: prometheus
  static_configs:
  - targets:
    - prometheus:9090
- job_name: grafana
  static_configs:
  - targets:
    - grafana:3000
- job_name: goflow2
  static_configs:
  - targets:
    - goflow2:8080
- job_name: snmp_exporter
  static_configs:
  - targets:
    - snmp-exporter:9116
- job_name: snmp_openwrt_172_16_156_1
  static_configs:
  - targets:
    - 172.16.156.1
    labels:
      vendor: openwrt
      hostname: HeartOfGold
  metrics_path: /snmp
  params:
    auth:
    - public_v2
    module:
    - if_mib
    - system
    - hrSystem
    - hrDevice
    - hrStorage
    - ip_mib
    - ucd_system_stats
    - ucd_memory
    - ip_forward_mib
  relabel_configs:
  - source_labels:
    - __address__
    target_label: __param_target
  - source_labels:
    - __param_target
    target_label: instance
  - target_label: __address__
    replacement: snmp-exporter:9116
