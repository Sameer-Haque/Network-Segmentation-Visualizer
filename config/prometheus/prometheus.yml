global:
  scrape_interval:     60s
  evaluation_interval: 60s

alerting:
  alertmanagers:
  - static_configs:
    - targets:

rule_files:

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
    - targets: ['prometheus:9090']
  - job_name: 'grafana'
    static_configs:
    - targets: ['grafana:3000']
  - job_name: 'goflow2'
    static_configs:
    - targets: ['goflow2:8080']