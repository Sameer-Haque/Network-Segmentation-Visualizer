    - orgId: 1
      name: Security Alerts
      folder: Visualizer - NetFlow
      interval: 5m
      rules:
        - uid: ffrm7f5tym03kc
          title: Unusual UDP Traffic Port
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 300
                to: 0
              datasourceUid: PDEE91DDB90597936
              model:
                adHocFilters: []
                adHocValuesQuery: ""
                add_metadata: true
                contextWindowSize: "10"
                database: default
                dateColDataType: date
                dateTimeColDataType: time_flow_start_ns
                dateTimeType: DATETIME64
                editorMode: sql
                extrapolate: true
                format: table
                formattedQuery: |-
                    SELECT
                        time_flow_start_ns AS time,
                        sum(bytes*sampling_rate) AS sumbytes
                    FROM $table
                    WHERE $timeFilter AND proto = 17 AND src_port BETWEEN 0 AND 1023 AND toString(src_port) NOT IN ('53', '123', '137', '138', '161', '192', '443', '500', '554', '749', '995')
                    GROUP BY time,
                    ORDER BY sumbytes DESC
                interval: ""
                intervalFactor: 1
                intervalMs: 1000
                maxDataPoints: 43200
                nullifySparse: false
                query: |-
                    SELECT
                        time_flow_start_ns AS time,
                        sum(bytes*sampling_rate) AS sumbytes
                    FROM $table
                    WHERE $timeFilter AND proto = 17 AND src_port BETWEEN 0 AND 1023 AND toString(src_port) NOT IN ('53', '123', '137', '138', '161', '192', '443', '500', '554', '749', '995')
                    GROUP BY time
                    ORDER BY sumbytes DESC
                refId: A
                round: 0s
                skip_comments: true
                table: flows_raw
                useWindowFuncForMacros: true
            - refId: B
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params: []
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - B
                      reducer:
                        params: []
                        type: count
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                reducer: count
                refId: B
                type: reduce
            - refId: C
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: B
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          dashboardUid: ""
          panelId: 0
          noDataState: OK
          execErrState: Error
          annotations:
            description: 'This alert is triggered if traffic is detected on any UDP port between 0 and 1023 in Netflow that is not in the following list: ''53'', ''123'', ''137'', ''138'', ''161'', ''192'', ''443'', ''500'', ''554'', ''749'', ''995'''
            summary: Traffic on a typically unused system UDP port (0-1023) detected.
          isPaused: false
          notification_settings:
            receiver: example-test-email
