          title: SNMP Device High Memory Usage
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 300
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                datasource:
                    type: prometheus
                    uid: PBFA97CFB590B2093
                editorMode: builder
                expr: (hrStorageUsed{hrStorageDescr=~"Physical memory|main memory"} * 100) / hrStorageSize{hrStorageDescr=~"Physical memory|main memory"}
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 90
                        type: gte
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Error
          for: 5m
          annotations:
            description: This alert is triggered if an SNMP device is at an average 90% memory usage or higher for at least 5 minutes continously.
            summary: SNMP device running out of memory.
          isPaused: false
          notification_settings:
            receiver: example-test-email
