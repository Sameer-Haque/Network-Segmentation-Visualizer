        - uid: ffrmd6it5iqkgb
          title: Unusual Transport Protocol
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 300
                to: 0
              datasourceUid: PDEE91DDB90597936
              model:
                adHocFilters: []
                adHocValuesQuery: ""
                add_metadata: true
                contextWindowSize: "10"
                database: default
                dateColDataType: date
                dateTimeColDataType: time_flow_start_ns
                dateTimeType: DATETIME64
                editorMode: sql
                extrapolate: true
                format: table
                formattedQuery: |-
                    WITH dictGetString('dictionaries.protocols', 'name', toUInt64(proto)) AS protoName
                    SELECT
                        time_flow_start_ns AS time,
                        sum(bytes*sampling_rate) AS sumbytes,
                        if(protoName = '', toString(proto), protoName) AS transportproto
                    FROM $table
                    WHERE $timeFilter AND toString(proto) NOT IN ('1', '2', '6', '17', '41', '43', '44', '47', '58', '59', '60', '88', '112',)
                    GROUP BY time, transportproto
                    ORDER BY sumbytes DESC
