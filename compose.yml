  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090/tcp"
    networks:
      - back-end
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: unless-stopped
    ports:
      - "9116:9116/tcp"
    networks:
      - back-end
    volumes:
      - ./config/snmp-exporter/snmp.yml:/etc/snmp-exporter
    command:
      - '--config.file=/etc/snmp_exporter/snmp.yml'

# This section commented out for now
# Not required for PoC features
# May be used for future features
#
#  node-exporter:
#    image: prom/node-exporter:latest
#    container_name: node-exporter
#    restart: unless-stopped
#    ports:
#      - "9100:9100/tcp"
#    networks:
#      - back-end
#

# This section commented out for now
# Not required for PoC features
# May be used for future features
# The port for cadvisor needs to be changed before enabling it to prevent conflict with goflow2
#
#  cadvisor:
#    image: ghcr.io/google/cadvisor:latest
#    container_name: cadvisor
#    restart: unless-stopped
#    ports:
#      - "8080:8080/tcp"
#    networks:
#      - back-end
#    volumes:
#      - /:/rootfs:ro
#      - /var/run:/var/run:rw
#      - /sys:/sys:ro
#      - /var/lib/docker/:/var/lib/docker:ro
#

  goflow2:
    image: netsampler/goflow2:latest
    container_name: goflow2
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "6343:6343/udp"
      - "2055:2055/udp"
      - "8080:8080/tcp"
    networks:
      - back-end
    command:
      - -transport.kafka.brokers=kafka:9092
      - -transport=kafka
      - -transport.kafka.topic=flows
      - -format=bin

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      - CLICKHOUSE_DO_NOT_CHOWN=1
      - CLICKHOUSE_PASSWORD=visualizer
    ports:
      - "8123:8123/tcp"
    networks:
      - back-end
    volumes:
      - ./clickhouse:/docker-entrypoint-initdb.d/
      - ./clickhouse/flow.proto:/var/lib/clickhouse/format_schemas/flow.proto
      - ./clickhouse/protocols.csv:/var/lib/clickhouse/user_files/protocols.csv

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: unless-stopped
    environment:
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_DELETE_TOPIC_ENABLE=true
      - KAFKA_BROKER_ID=1
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=IB
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT,IB:PLAINTEXT
      - KAFKA_LISTENERS=CONTROLLER://:9093,BROKER://:9092,IB://:9094
      - KAFKA_ADVERTISED_LISTENERS=BROKER://kafka:9092,IB://:9094
    ports:
      - "9092:9092/tcp"
    networks:
      - back-end

networks:
  back-end: {}