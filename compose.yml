name: network-visualizer

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_INSTALL_PLUGINS=vertamedia-clickhouse-datasource
    ports:
      - "3000:3000/tcp"
    networks:
      - back-end
    volumes:
      - ./config/grafana/datasources-ch.yml:/etc/grafana/provisioning/datasources/datasources-ch.yml

