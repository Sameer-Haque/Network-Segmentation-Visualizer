name: network-visualizer

services:
  node-map:
    build: 
        context: ./node-map
        dockerfile: dockerfile
    container_name: node-map
    network_mode: host
    volumes: [./node-map:/nodemap]

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_INSTALL_PLUGINS=vertamedia-clickhouse-datasource, yesoreyeram-infinity-datasource
    ports:
      - "3000:3000/tcp"
    networks:
      - back-end
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/lib:/var/lib/grafana
      - ./config/grafana/grafana.ini:/etc/grafana/grafana.ini

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090/tcp"
    networks:
      - back-end
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: unless-stopped
    ports:
      - "9116:9116/tcp"
    networks:
      - back-end
    volumes:
      - ./config/snmp-exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    command:
      - '--config.file=/etc/snmp_exporter/snmp.yml'

  goflow2:
    image: netsampler/goflow2:latest
    container_name: goflow2
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "6343:6343/udp"
      - "2055:2055/udp"
      - "8080:8080/tcp"
    networks:
      - back-end
    command:
      - -transport.kafka.brokers=kafka:9092
      - -transport=kafka
      - -transport.kafka.topic=flows
      - -format=bin

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      - CLICKHOUSE_DO_NOT_CHOWN=1
      - CLICKHOUSE_PASSWORD=visualizer
    ports:
      - "8123:8123/tcp"
    networks:
      - back-end
    volumes:
      - ./config/clickhouse:/docker-entrypoint-initdb.d/
      - ./config/clickhouse/flow.proto:/var/lib/clickhouse/format_schemas/flow.proto
      - ./config/clickhouse/protocols.csv:/var/lib/clickhouse/user_files/protocols.csv

# A note on the Kafka config
# We need KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 because we are only running 1 Kafka server
# The default setting assumes you are running a full cluster of at least 3 servers
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: unless-stopped
    environment:
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_DELETE_TOPIC_ENABLE=true
      - KAFKA_BROKER_ID=1
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=IB
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,BROKER:PLAINTEXT,IB:PLAINTEXT
      - KAFKA_LISTENERS=CONTROLLER://:9093,BROKER://:9092,IB://:9094
      - KAFKA_ADVERTISED_LISTENERS=BROKER://kafka:9092,IB://:9094
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    ports:
      - "9092:9092/tcp"
    networks:
      - back-end

networks:
  back-end: {}
